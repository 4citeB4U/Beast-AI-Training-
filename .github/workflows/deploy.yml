name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        env:
          GIT_TERMINAL_PROMPT: 0
        run: |
          node -e "const fs=require('fs'); const p='package.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); if (j.dependencies && j.dependencies['leeway-edge-rtc']) { delete j.dependencies['leeway-edge-rtc']; fs.writeFileSync(p, JSON.stringify(j, null, 2)+'\\n'); console.log('Removed root leeway-edge-rtc for CI build.'); }"
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEAST AI Academy | Powered by Leeway Innovations</title>
    <link rel="manifest" href="manifest.json" />
    <style>
      body { margin: 0; background: #0a0a0a; font-family: 'Inter', sans-serif; overflow-x: hidden; }
      #splash-screen {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        transition: opacity 0.4s ease-in-out, visibility 0.4s;
        will-change: opacity;
      }
      .boot-container {
        width: 240px;
        text-align: center;
        position: relative;
      }
      .boot-logo {
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: -0.05em;
        margin-bottom: 0.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.15rem;
        color: #fff;
      }
      .boot-logo span { color: #10b981; }
      .boot-subtitle {
        font-size: 7px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.25em;
        color: #525252;
        margin-bottom: 1.25rem;
      }
      .boot-bar {
        height: 2px;
        width: 100%;
        background: #262626;
        position: relative;
        overflow: hidden;
      }
      .boot-progress {
        position: absolute;
        height: 100%;
        width: 0%;
        background: #10b981;
        box-shadow: 0 0 10px #10b981;
        animation: progress 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      .boot-text {
        font-size: 8px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        margin-top: 1rem;
        color: #525252;
      }
      @keyframes progress {
        0% { width: 0%; left: 0%; }
        50% { width: 50%; left: 25%; }
        100% { width: 0%; left: 100%; }
      }
      .scanline {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.3) 51%);
        background-size: 100% 4px;
        pointer-events: none;
        opacity: 0.1;
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="scanline"></div>
      <div class="boot-container">
        <div class="boot-logo">BEAST<span>AI</span></div>
        <div class="boot-subtitle">Powered by Leeway Innovations</div>
        <div class="boot-bar">
          <div class="boot-progress"></div>
        </div>
        <div class="boot-text">Initializing Leeway SDK...</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
    <script>
      // HARD FAIL-SAFE: If the main bundle doesn't load within 4s, hide the splash anyway.
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if (splash && getComputedStyle(splash).opacity !== '0') {
          console.warn('HARD_FAIL_SAFE: Hiding splash screen via inline script.');
          splash.style.opacity = '0';
          splash.style.visibility = 'hidden';
          document.body.style.overflow = 'auto';
        }
      }, 4000);

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then((registration) => {
            console.log('SW_READY: Beast AI Service Worker registered.');
          }).catch((error) => {
            console.error('SW_FAILURE: Service Worker registration failed.', error);
          });
        });
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEAST AI Academy | Powered by Leeway Innovations</title>
    <link rel="manifest" href="/manifest.json" />
    <style>
      body { margin: 0; background: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
      #splash-screen {
        position: fixed;
        inset: 0;
        background: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        transition: opacity 0.4s ease-in-out, visibility 0.4s;
        will-change: opacity;
      }
      .boot-container {
        width: 240px;
        text-align: center;
        position: relative;
      }
      .boot-logo {
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: -0.05em;
        margin-bottom: 0.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.15rem;
        color: #0f172a;
      }
      .boot-logo span { color: #059669; }
      .boot-subtitle {
        font-size: 7px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.25em;
        color: #94a3b8;
        margin-bottom: 1.25rem;
      }
      .boot-bar {
        height: 2px;
        width: 100%;
        background: #e2e8f0;
        position: relative;
        overflow: hidden;
        border-radius: 99px;
      }
      .boot-progress {
        position: absolute;
        height: 100%;
        width: 0%;
        background: #059669;
        box-shadow: 0 0 10px rgba(5, 150, 105, 0.3);
        animation: progress 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      .boot-text {
        font-size: 8px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        margin-top: 1rem;
        color: #94a3b8;
      }
      #boot-fallback {
        display: none;
        position: fixed;
        inset: 0;
        background: #ffffff;
        color: #0f172a;
        z-index: 99;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        font-family: Inter, sans-serif;
      }
      #boot-fallback .title {
        font-size: 1rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
      }
      #boot-fallback .subtitle {
        font-size: 0.9rem;
        color: #475569;
        max-width: 42ch;
        line-height: 1.5;
      }
      @keyframes progress {
        0% { width: 0%; left: 0%; }
        50% { width: 50%; left: 25%; }
        100% { width: 0%; left: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="boot-container">
        <div class="boot-logo">BEAST<span>AI</span></div>
        <div class="boot-subtitle">Powered by Leeway Innovations</div>
        <div class="boot-bar">
          <div class="boot-progress"></div>
        </div>
        <div class="boot-text">Initializing Leeway SDK...</div>
      </div>
    </div>
    <div id="boot-fallback" role="alert" aria-live="polite">
      <div>
        <div class="title">Boot timeout reached</div>
        <div class="subtitle">The app is taking too long to start. This usually means the deployment is serving source files instead of the production build.</div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (() => {
        const timeoutMs = 5000;
        setTimeout(() => {
          const root = document.getElementById('root');
          const splash = document.getElementById('splash-screen');
          const fallback = document.getElementById('boot-fallback');
          const appMounted = !!root && root.childElementCount > 0;

          if (!appMounted) {
            if (splash) {
              splash.style.opacity = '0';
              splash.style.visibility = 'hidden';
            }
            if (fallback) {
              fallback.style.display = 'flex';
            }
          }
        }, timeoutMs);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
